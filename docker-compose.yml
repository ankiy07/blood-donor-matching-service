services:
  postgres:
    image: postgres:18-alpine
    container_name: bdms_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bdms
    ports:
      - "5433:5432"
    volumes:
      - bdms_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bdms" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  bdms_data:
    driver: local
